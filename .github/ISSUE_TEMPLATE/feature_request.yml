name: Feature request
description: Propose a focused improvement to agent-keepalive
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the operator problem this feature would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior you want, including provider-specific expectations if relevant.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider impact
      options:
        - codex
        - claude
        - both
        - generic
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or alternative approaches.
    validations:
      required: false
