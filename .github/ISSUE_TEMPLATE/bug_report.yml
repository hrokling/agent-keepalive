name: Bug report
description: Report a reproducible defect in agent-keepalive
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: agent-keepalive version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - codex
        - claude
        - both
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, provider CLI version, and systemd context if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the exact command or service setup needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or status output
      description: Paste relevant `agent-keepalive status`, service status, or log excerpts.
    validations:
      required: false
